<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS SAA · practice quiz</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
 
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      background: linear-gradient(145deg, #faeaea 0%, #f8d7d7 100%);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    .card {
      border-radius: 24px;
      border: none;
      width: 560px;               
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(2px);
      box-shadow: 0 20px 40px -12px rgba(140, 0, 0, 0.25);
    }

    .heading {
      font-size: 28px;
      font-weight: 600;
      color: #8b1a1a;             
      letter-spacing: -0.3px;
    }

    .timer {
      font-size: 22px;
      font-weight: 600;
      color: #a52a2a;              
      background: rgba(255, 235, 235, 0.7);
      padding: 6px 14px;
      border-radius: 60px;
      border: 1px solid rgba(180, 60, 60, 0.2);
    }

    .question {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 20px;
      color: #2d2d2d;
      border-left: 5px solid #b03a3a;
      padding-left: 18px;
      background: rgba(250, 240, 240, 0.5);
      border-radius: 0 12px 12px 0;
    }

    .form-check-label {
      font-size: 18px;
      color: #1f1f1f;
      transition: 0.1s;
    }

    .form-check-input:checked {
      background-color: #b03a3a;
      border-color: #b03a3a;
    }

    .form-check-input:focus {
      border-color: #b03a3a;
      box-shadow: 0 0 0 0.2rem rgba(180, 60, 60, 0.25);
    }

    .btn {
      font-size: 18px;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 500;
    }

    .btn-primary {
      background-color: #8b1a1a;
      border: none;
    }

    .btn-primary:hover {
      background-color: #6d1313;
    }

    .btn-outline-secondary {
      border-color: #b76e6e;
      color: #7a3b3b;
    }

    .btn-outline-secondary:hover {
      background-color: #f3dddd;
      border-color: #a14b4b;
      color: #631212;
    }
  </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <span class="heading">☁️ AWS SAA · quiz</span>
    <span class="timer" id="time">05:00</span>
  </div>

  <div id="quiz"></div>

  <div class="d-flex justify-content-between mt-4">
    <button class="btn btn-outline-secondary" id="prev">Previous</button>
    <button class="btn btn-primary" id="next">Next</button>
  </div>
</div>

<script>
  $(function () {
    const totalTime = 5 * 60;       
    let timeLeft = totalTime;
    let timer;

   
    const questions = [
      {
        q: "A solutions architect needs to design a highly available, fault-tolerant database layer for a stateful web app. Which AWS service meets these requirements with minimal operational overhead?",
        o: ["Amazon RDS with Multi-AZ deployment", "Amazon EC2 in an Auto Scaling group", "Amazon DynamoDB global tables", "Amazon Redshift with cross-region snapshot"],
        a: 0,                         // RDS Multi-AZ
        type: "single"
      },
      {
        q: "Which storage class is the MOST cost-effective for long-term archival of data that is accessed less than once a year, with a retrieval time of 12 hours?",
        o: ["Amazon S3 Glacier Deep Archive", "Amazon S3 Standard-IA", "Amazon S3 One Zone-IA", "Amazon S3 Glacier Flexible Retrieval"],
        a: 0,                         // Glacier Deep Archive
        type: "single"
      },
      {
        q: "A company wants to separate costs for different departments that share the same AWS account. Which AWS feature should be used to track and allocate costs?",
        o: ["Resource Groups & Tag Editor", "AWS Cost Explorer", "Cost allocation tags", "AWS Budgets"],
        a: 2,                         // cost allocation tags
        type: "single"
      },
      {
        q: "Which S3 storage classes provide immediate availability for first-byte access and are designed for frequently accessed data? (Select TWO)",
        o: ["S3 Standard", "S3 Glacier Instant Retrieval", "S3 Intelligent-Tiering", "S3 One Zone-IA", "S3 Glacier Deep Archive"],
        a: [0, 2],                     // Standard & Intelligent-Tiering (both give immediate retrieval)
        type: "multi"
      },
      {
        q: "An application running on EC2 needs to securely access an Amazon S3 bucket without storing credentials in the code. What is the recommended approach?",
        o: ["Create an IAM access key and store it in the application config", "Use EC2 instance profiles with an IAM role", "Generate a signed URL every time", "Store credentials in AWS Systems Manager Parameter Store as plain text"],
        a: 1,                           // instance profile + IAM role
        type: "single"
      }
    ];

    let index = 0;
    let answers = [];

    function startTimer() {
      timer = setInterval(() => {
        timeLeft--;

        let min = Math.floor(timeLeft / 60);
        let sec = timeLeft % 60;

        $('#time').text(`${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`);

        if (timeLeft <= 0) {
          clearInterval(timer);
          showResult();
        }
      }, 1000);
    }

    function loadQuestion() {
      let q = questions[index];
      let html = `<div class="question">${index + 1}. ${q.q}</div>`;

      q.o.forEach((opt, i) => {
        let checked = '';
        if (answers[index] !== undefined && answers[index] !== null) {
          if (q.type === 'single' && answers[index] === i) checked = 'checked';
          if (q.type === 'multi' && Array.isArray(answers[index]) && answers[index].includes(i)) checked = 'checked';
        }

        html += `
          <div class="form-check mb-3">
            <input class="form-check-input" type="${q.type === 'single' ? 'radio' : 'checkbox'}" name="opt" value="${i}" ${checked}>
            <label class="form-check-label">${opt}</label>
          </div>`;
      });

      $('#quiz').fadeOut(150, function () {
        $(this).html(html).fadeIn(150);
      });

      $('#prev').prop('disabled', index === 0);
      $('#next').text(index === questions.length - 1 ? 'Finish' : 'Next');
    }

    $('#next').click(function () {
      let q = questions[index];
      let selected = [];

      $('input[name="opt"]:checked').each(function () {
        selected.push(parseInt($(this).val()));
      });

      if (selected.length === 0) {
        alert('Please select at least one option before proceeding.');
        return;
      }

      
      answers[index] = (q.type === 'single') ? selected[0] : selected;

      if (index === questions.length - 1) {
        clearInterval(timer);
        showResult();
      } else {
        index++;
        loadQuestion();
      }
    });

    $('#prev').click(function () {
      index--;
      loadQuestion();
    });

    function showResult() {
      let score = 0;

      questions.forEach((q, i) => {
        const userAns = answers[i];
        if (userAns === undefined || userAns === null) return;

        if (q.type === 'single') {
          if (userAns === q.a) score++;
        } else { // multi
          if (Array.isArray(userAns) && Array.isArray(q.a)) {
            const sortedUser = [...userAns].sort((x, y) => x - y);
            const sortedCorrect = [...q.a].sort((x, y) => x - y);
            if (JSON.stringify(sortedUser) === JSON.stringify(sortedCorrect)) score++;
          }
        }
      });

      $('#quiz').html(`
        <div class="text-center py-3">
          <h4 class="text-secondary fw-light">quiz completed</h4>
          <h1 class="display-4" style="color: #8b1a1a;">${score} / ${questions.length}</h1>
          <p class="text-muted mb-3">AWS SAA · practice</p>
          <button class="btn btn-primary px-5" id="restart">⟳ Restart</button>
        </div>
      `);

      $('.d-flex.justify-content-between.mt-4').hide();
    }

    $(document).on('click', '#restart', function () {
      index = 0;
      answers = [];
      timeLeft = totalTime;
      $('#time').text('05:00');
      $('.d-flex.justify-content-between.mt-4').show();
      startTimer();
      loadQuestion();
    });

    
    startTimer();
    loadQuestion();
  });
</script>

</body>
</html>
